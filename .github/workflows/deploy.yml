# deploy.yml
name: Go CD (Deploy to Debian)

on:
  workflow_run:
    workflows: ["Go CI (Gin Web)"] # 只有当 CI 成功后才触发
    types:
      - completed

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    #物理判断：只有 CI 成功且是 main 分支才执行
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 使用 sudo 确保有权创建目录
            sudo mkdir -p /var/www/gin-app
            sudo chown -R sudolsq:sudolsq /var/www/gin-app
            cd /var/www/gin-app
            
            # 物理清理旧进程
            sudo pkill gin-server || true
            
            # 拉取代码
            git pull origin main || git clone https://github.com/LinCrayon/gin-action.git .
            
            # 物理查找 Go 路径（GCP 上的 Go 可能在 /usr/bin/go）
            export PATH=$PATH:/usr/local/go/bin:/usr/bin
            go build -o gin-server main.go
            
            # 物理启动
            chmod +x gin-server
            nohup ./gin-server > nohup.out 2>&1 &
            sleep 2
            echo "Physical check:"
            ps aux | grep gin-server