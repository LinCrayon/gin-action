# deploy.yml
name: Go CD (Deploy to Debian)

on:
  workflow_run:
    workflows: ["Go CI (Gin Web)"] # 只有当 CI 成功后才触发
    types:
      - completed

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    #物理判断：只有 CI 成功且是 main 分支才执行
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. 定义物理路径（直接用当前用户家目录，避开权限坑）
            DEPLOY_DIR="$HOME/gin-app"
            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR
            
            # 2. 彻底清理旧进程和旧代码
            sudo pkill gin-server || true
            sudo rm -rf ./*
            
            # 3. 环境变量物理对齐 (必须包含 Go 的路径)
            export PATH=$PATH:/usr/local/go/bin:/usr/bin
            
            # 4. 物理拉取代码
            echo "Starting git clone..."
            git clone https://github.com/LinCrayon/gin-action.git .
            
            # 5. 编译 (确保进入了有 go.mod 的目录)
            if [ -f "go.mod" ]; then
              go mod tidy
              go build -o gin-server .
            else
              echo "Error: go.mod not found!" && exit 1
            fi
            
            # 6. 物理后台启动
            chmod +x gin-server
            nohup ./gin-server > nohup.out 2>&1 &
            
            # 7. 物理验证
            sleep 3
            echo "--- Physical Process Check ---"
            ps aux | grep gin-server | grep -v grep