name: Go CI (Gin Web)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Go 环境
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 3. 缓存 Go 依赖
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # 4. 下载依赖
      - name: Install dependencies
        run: go mod tidy

      # 5. 编译项目
      - name: Build
        run: go build -v ./...

      # 6. 运行测试
      - name: Test
        run: go test -v ./...

      # 7. 启动 Gin 服务测试
      - name: Run Gin Server
        run: |
          nohup go run main.go &
          sleep 5
          curl http://localhost:8080 || exit 1
  
